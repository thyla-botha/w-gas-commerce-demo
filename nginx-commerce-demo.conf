# ============================================================
# weGAS Commerce Intelligence demo — static SPA at /commerce-demo/
# Add this location block INSIDE your existing hub.w-gas.co.za
# TLS server block, i.e.:
#
#   server {
#       listen 443 ssl;
#       server_name hub.w-gas.co.za;
#       ...        # existing command-centre / Next.js / etc.
#
#       include /etc/nginx/snippets/commerce-demo.conf;   # <- or paste the block below
#   }
#
# Then: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

location /commerce-demo/ {
    alias /var/www/wgas-commerce-demo/;
    index index.html;

    # The app is hash-routed (#home, #bi, ...), so every real request maps
    # to a real file on disk — a plain 404 for missing assets is correct.
    try_files $uri $uri/ =404;

    # Static assets are content-stable; let browsers cache them.
    location ~* \.(?:css|js|png|jpe?g|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
