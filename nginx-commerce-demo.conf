# ============================================================
# weGAS Commerce Intelligence demo — static SPA at /commerce-demo/
#
# This is the block actually deployed on the VPS, inside
#   /etc/nginx/sites-available/command-centre
# (the hub.w-gas.co.za server block), placed ABOVE `location / {`
# which proxies to the command centre on :3000.
#
# It mirrors the existing /forex-demo/ and /casino-demo/ blocks:
#   ^~          = prefix match wins over the catch-all proxy
#   no-cache    = browsers always revalidate, so redeploys show immediately
#
# After editing: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# no-slash -> trailing-slash, else nginx falls through to the command-centre
# proxy and its auth gate bounces you to /login.
location = /commerce-demo { return 301 /commerce-demo/; }

location ^~ /commerce-demo/ {
    alias /var/www/wgas-commerce-demo/;
    index index.html;
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ =404;
}
